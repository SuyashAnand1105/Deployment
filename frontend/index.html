<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NexusAI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, #1e293b, #0f172a);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      color: white;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 35px;
      font-size: 1.1rem;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #1e293b;
      border: none;
      outline: none;
      resize: none;
      border-radius: 18px;
      padding: 20px;
      color: white;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .response-box {
      margin-top: 30px;
      background: #111827;
      padding: 25px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .response-title {
      color: #60a5fa;
      margin-bottom: 15px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .response-text {
      color: #e2e8f0;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      color: #facc15;
    }

    @media(max-width:768px) {

      .container {
        padding: 25px;
      }

      .logo {
        font-size: 2.2rem;
      }

      textarea {
        height: 150px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      NexusAI
    </div>

    <div class="subtitle">
      Your Personal AI Tutor
    </div>

    <textarea
      id="promptInput"
      placeholder="Ask anything..."></textarea>

    <button id="askBtn">
      Ask AI
    </button>

    <div class="response-box">

      <div class="response-title">
        Response
      </div>

      <div
        class="response-text"
        id="responseText">

        Ask something to start...

      </div>

    </div>

  </div>

  <script>

    const askBtn =
      document.getElementById("askBtn");

    const promptInput =
      document.getElementById("promptInput");

    const responseText =
      document.getElementById("responseText");

    askBtn.addEventListener("click", async () => {

      const prompt =
        promptInput.value.trim();

      if (!prompt) {
        responseText.innerHTML =
          "Please enter a prompt.";
        return;
      }

      responseText.innerHTML =
        "<span class='loading'>Thinking...</span>";

      try {

        const response =
          await fetch(
            "https://deployment-1-qstf.onrender.com/run_task",
            {
              method: "POST",

              headers: {
                "Content-Type": "application/json"
              },

              body: JSON.stringify({
                user_prompt: prompt
              })
            }
          );

        const data =
          await response.json();

        if (data.response) {

          responseText.innerHTML =
            data.response;

        } else if (data.error) {

          responseText.innerHTML =
            "Error: " + data.error;

        } else {

          responseText.innerHTML =
            "Unexpected response from server.";

        }

      } catch (error) {

        responseText.innerHTML =
          "Failed to connect with backend.";

      }

    });

  </script>

</body>

</html>
